services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/vanekt/the-last-of-guss-backend:${IMAGE_TAG:?IMAGE_TAG is required, e.g. v1.0.0}
    container_name: backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: ${BACKEND_PORT:-3001}
      ROUND_DURATION: ${ROUND_DURATION:-60}
      COOLDOWN_DURATION: ${COOLDOWN_DURATION:-30}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required, e.g. https://last-of-guss.example.com}
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"

  frontend:
    image: ghcr.io/vanekt/the-last-of-guss-frontend:${IMAGE_TAG:?IMAGE_TAG is required, e.g. v1.0.0}
    container_name: frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  pg_data:
